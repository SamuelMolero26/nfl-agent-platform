services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    networks:
      - nfl_net
    volumes:
      - redis_data:/data

  nanoclaw:
    image: ${IMAGE_NAME:-ghcr.io/samuelmolero26/nfl-agent-platform}:latest
    ports:
      - "8002:8002"
    env_file: .env
    volumes:
      - nanoclaw_db:/app/data
      - ./nanoclaw_service/config.yaml:/app/nanoclaw_service/config.yaml:ro
      - ./nanoclaw_service/agent/core.py:/app/nanoclaw_service/agent/core.py:ro
    environment:
      SQLITE_PATH: /app/data/nanoclaw.db
      REDIS_URL: redis://redis:6379
    depends_on:
      - redis
    networks:
      - nfl_net
      - nfl-data-platform_default
      - nfl-model-platform_internal
    restart: unless-stopped

volumes:
  nanoclaw_db:
  redis_data:

networks:
  nfl_net:
    external: true
  nfl-data-platform_default:
    external: true
  nfl-model-platform_internal:
    external: true
